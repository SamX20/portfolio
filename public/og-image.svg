<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Xsamer video editing and motion graphics portfolio</title>
  <desc id="desc">Open graph image for Xsamer, freelance video editor and motion graphics designer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070b"/>
      <stop offset="0.48" stop-color="#080808"/>
      <stop offset="1" stop-color="#0a1524"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8ed8ff"/>
      <stop offset="0.52" stop-color="#4aa3ff"/>
      <stop offset="1" stop-color="#2f7dff"/>
    </linearGradient>
    <radialGradient id="glowA" cx="25%" cy="25%" r="60%">
      <stop offset="0" stop-color="#8ed8ff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8ed8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="80%" cy="70%" r="54%">
      <stop offset="0" stop-color="#2f7dff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#2f7dff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="logoClip">
      <rect x="26" y="28" width="214" height="214" rx="44"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <g opacity="0.16">
    <path d="M-80 470 C190 420 370 520 610 468 C850 416 995 338 1280 380" fill="none" stroke="#8ed8ff" stroke-width="2"/>
    <path d="M-60 505 C220 448 382 552 625 504 C866 456 1040 378 1260 420" fill="none" stroke="#ffffff" stroke-width="1"/>
    <path d="M-70 210 C160 165 335 260 570 218 C812 174 980 116 1280 146" fill="none" stroke="#4aa3ff" stroke-width="2"/>
  </g>

  <g opacity="0.08">
    <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#ffffff"/>
    <path d="M100 0v630M300 0v630M500 0v630M700 0v630M900 0v630M1100 0v630M0 105h1200M0 315h1200M0 525h1200" stroke="#ffffff" stroke-width="1"/>
  </g>

  <g transform="translate(92 102)">
