    <image href="/WhatsApp%20Image%202026-07-04%20at%2012.41.26%20AM.jpeg" x="26" y="28" width="214" height="214" preserveAspectRatio="xMidYMid slice" clip-path="url(#logoClip)"/>
    <rect x="26" y="28" width="214" height="214" rx="44" fill="none" stroke="url(#accent)" stroke-width="3"/>
