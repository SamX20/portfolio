    <text x="54" y="68" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="900" fill="#05070b">Sam</text>
  </g>

  <g transform="translate(92 244)">
    <text font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900" letter-spacing="8" fill="#8ed8ff">MOTION GRAPHICS / VIDEO EDITING</text>
    <text y="88" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="900" fill="#ffffff">Xsamer</text>
    <text y="168" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="900" fill="#ffffff">Freelance Video Editor</text>
    <text y="224" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#b8c2cc">Promos, social content, brand stories, and polished edits.</text>
  </g>

  <g transform="translate(820 112)" filter="url(#shadow)">
