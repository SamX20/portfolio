<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(168,85,247,0.1)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Main content -->
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="url(#text)">
    محمد علي
  </text>

  <text x="600" y="280" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#ffffff">
    مصمم ومحرر فيديو احترافي
  </text>

  <text x="600" y="340" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#cccccc">
    Motion Designer & Video Editor
  </text>

  <!-- Decorative elements -->
  <circle cx="200" cy="400" r="80" fill="none" stroke="url(#text)" stroke-width="3" opacity="0.6"/>
  <circle cx="1000" cy="200" r="60" fill="none" stroke="url(#text)" stroke-width="2" opacity="0.4"/>

  <!-- Bottom text -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#888888">
    portfolio.vercel.app
  </text>
</svg>